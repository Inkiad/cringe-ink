    <style>
    /* ── Spotify page specifics ── */
    .sp-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin: 16px 0 24px;
    }
    .sp-nb {
        font-family: 'Courier New', monospace;
        font-size: 0.62rem;
        background: #1e1e1e;
        color: #606058;
        border: 1px solid #2a2a2a;
        padding: 3px 9px;
        cursor: pointer;
        user-select: none;
        transition: color 0.1s, background 0.1s, border-color 0.1s;
    }
    .sp-nb:hover  { color: #a0a098; border-color: #3a3a36; }
    .sp-nb.on     { background: #252520; color: #d8d8d0; border-color: #505048; }

    .sp-sec       { display: none; }
    .sp-sec.on    { display: block; }

    .sp-meta {
        font-family: 'Courier New', monospace;
        font-size: 0.62rem;
        color: #484840;
        margin-bottom: 22px;
        line-height: 2;
    }
    .sp-meta .v   { color: #9a9a90; }
    .sp-meta .sep { margin: 0 10px; color: #2e2e2a; }

    .sp-subh {
        font-family: 'Courier New', monospace;
        font-size: 0.55rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #484840;
        border-bottom: 1px solid #1e1e1e;
        padding-bottom: 6px;
        margin: 0 0 14px;
    }

    .sp-block { margin-bottom: 32px; }

    /* bar charts */
    .bchart { display: flex; flex-direction: column; gap: 4px; }
    .brow   { display: grid; grid-template-columns: 58px 1fr 60px; gap: 8px; align-items: center; }
    .blbl   { text-align: right; font-family: 'Courier New', monospace; font-size: 0.6rem; color: #484840; }
    .btrack { background: #1c1c1a; height: 14px; }
    .bfill  { height: 100%; }
    .bval   { font-family: 'Courier New', monospace; font-size: 0.6rem; color: #808078; text-align: right; }

    /* two-col grid */
    .sp-two { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
    @media (max-width: 600px) { .sp-two { grid-template-columns: 1fr; } }

    /* table overrides for spotify tables */
    .sp-tbl td    { padding: 7px 10px 7px 0; border-bottom: 1px solid #1c1c1a; vertical-align: top; }
    .sp-tbl th    { padding: 5px 10px 5px 0; }
    .sp-tbl tr:hover td { background: #1c1c1a; }
    .sp-tbl tr:last-child td { border-bottom: none; }
    .sp-tbl .r    { text-align: right; }

    /* artist subtitle inside table cell */
    .sp-sub {
        display: block;
        font-family: 'Courier New', monospace;
        font-size: 0.55rem;
        color: #484840;
        line-height: 1.5;
        margin-top: 2px;
    }
    .sp-note  { font-style: italic; color: #383830; }
    .sp-genre { color: #5a8a6a; font-family: 'Courier New', monospace; font-size: 0.62rem; }

    /* device bars */
    .devbars { display: flex; flex-direction: column; gap: 6px; }
    .drow    { display: grid; grid-template-columns: 130px 1fr 54px 54px; gap: 8px; align-items: center; }
    .dn      { font-family: 'Courier New', monospace; font-size: 0.65rem; color: #808078; }
    .dp      { font-family: 'Courier New', monospace; font-size: 0.6rem; color: #484840; text-align: right; }
    @media (max-width: 600px) {
        .drow { grid-template-columns: 100px 1fr 44px; }
        .dplays { display: none; }
    }

    /* filter row */
    .sp-filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .sp-filters .rh-search { font-size: 0.65rem; min-width: 180px; }
    .sp-filters .rh-sort   { font-size: 0.65rem; }

    .sp-rc {
        font-family: 'Courier New', monospace;
        font-size: 0.58rem;
        color: #383830;
        margin-bottom: 10px;
    }
    </style>
</head>

<div id="page">

    <div id="header">
        <div id="header-banner"></div>
        <div id="header-text">
            <div id="site-title"><a href="index.html">inky</a></div>
            <div id="site-tagline">somewhere on the internet</div>
        </div>
    </div>

    <div id="columns">
    <div id="main">

        <div class="entry-meta">
            <span class="entry-title">spotify / inkyyyyy</span>
            <span class="entry-date" id="sp-daterange"></span>
        </div>

        <div class="sp-meta" id="sp-meta"></div>

        <div class="sp-nav">
            <button class="sp-nb on" onclick="spNav('overview',this)">overview</button>
            <button class="sp-nb" onclick="spNav('alltime',this)">all-time</button>
            <button class="sp-nb" onclick="spNav('yearly',this)">by year</button>
            <button class="sp-nb" onclick="spNav('quarterly',this)">quarterly</button>
            <button class="sp-nb" onclick="spNav('devices',this)">devices</button>
        </div>

        <!-- OVERVIEW -->
        <div id="sp-overview" class="sp-sec on">
            <div class="sp-block">
                <div class="sp-subh">hours per year</div>
                <div class="bchart" id="hr-chart"></div>
            </div>
        </div>

        <!-- ALL-TIME -->
        <div id="sp-alltime" class="sp-sec">
            <div class="sp-nav" style="margin-top:0">
                <button class="sp-nb on" onclick="atPill(this,'at-artists')">artists</button>
                <button class="sp-nb" onclick="atPill(this,'at-tracks')">tracks</button>
            </div>
            <div id="at-artists">
                <table class="st-tbl sp-tbl" id="tbl-ata"></table>
            </div>
            <div id="at-tracks" style="display:none">
                <table class="st-tbl sp-tbl" id="tbl-att"></table>
            </div>
        </div>

        <!-- BY YEAR -->
        <div id="sp-yearly" class="sp-sec">
            <div class="sp-nav" style="margin-top:0" id="yr-pills"></div>
            <div class="sp-meta" id="yr-stats"></div>
            <div class="sp-two" id="yr-content"></div>
        </div>

        <!-- QUARTERLY -->
        <div id="sp-quarterly" class="sp-sec">
            <div class="sp-filters">
                <input  class="rh-search" type="text" id="qs" placeholder="search track / artist…" oninput="rqtr()">
                <select class="rh-sort" id="qy" onchange="rqtr()"><option value="">all years</option></select>
                <select class="rh-sort" id="qq" onchange="rqtr()">
                    <option value="">all quarters</option>
                    <option>Q1</option><option>Q2</option><option>Q3</option><option>Q4</option>
                </select>
                <select class="rh-sort" id="qg" onchange="rqtr()"><option value="">all genres</option></select>
            </div>
            <div class="sp-rc" id="qrc"></div>
            <div style="overflow-x:auto">
                <table class="st-tbl sp-tbl">
                    <thead><tr>
                        <th style="width:24px">#</th>
                        <th>track</th>
                        <th>artist</th>
                        <th class="r">plays</th>
                        <th>genre</th>
                        <th>period</th>
                    </tr></thead>
                    <tbody id="q-body"></tbody>
                </table>
            </div>
        </div>

        <!-- DEVICES -->
        <div id="sp-devices" class="sp-sec">
            <div class="sp-nav" style="margin-top:0" id="dev-pills"></div>
            <div id="dev-content"></div>
        </div>

    </div>

    <div id="sidebar">
        <div class="widget">
            <div class="widget-title">nav</div>
            <div class="widget-body">
                <a href="blog.html">blog</a><br>
                <a href="projects.html">projects</a><br>
                <a href="experiences.html">experiences</a><br>
                <a href="menu.html">menu</a><br>
                <a href="spotify.html">spotify</a>
            </div>
        </div>
        <div class="widget">
            <div class="widget-title">currently</div>
            <div class="widget-body">
                mood: <span class="val">tired</span><br>
                avoiding: <span class="val">work</span><br>
                watching: <span class="val" id="sidebar-watching">—</span>
            </div>
        </div>
        <div class="widget">
            <div class="widget-title">site</div>
            <div class="widget-body">
                est. <span class="val">2024</span><br>
                updated: <span class="val">jun '26</span>
            </div>
        </div>
        <div class="widget">
            <div class="widget-title">elsewhere</div>
            <div class="widget-body">
                <a href="https://github.com/Inkiad" target="_blank">github</a>
            </div>
        </div>
    </div>

// ── Util ─────────────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function commas(n) { return Number(n).toLocaleString(); }

// ── Nav ──────────────────────────────────────────────────────────────────────
function spNav(id, btn) {
    document.querySelectorAll('.sp-sec').forEach(s => s.classList.remove('on'));
    document.querySelectorAll('.sp-nav .sp-nb').forEach(b => b.classList.remove('on'));
    document.getElementById('sp-' + id).classList.add('on');
    btn.classList.add('on');
}

function atPill(btn, which) {
    btn.closest('.sp-nav').querySelectorAll('.sp-nb').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('at-artists').style.display = which === 'at-artists' ? '' : 'none';
    document.getElementById('at-tracks').style.display  = which === 'at-tracks'  ? '' : 'none';
}

// ── Header ────────────────────────────────────────────────────────────────────
function initHeader() {
    const o = D.ov;
    document.getElementById('sp-daterange').textContent = o.dMin + ' → ' + o.dMax;
    document.getElementById('sp-meta').innerHTML =
        '<span class="v">' + commas(o.hrs) + 'h</span> listened' +
        '<span class="sep">·</span><span class="v">' + commas(o.plays) + '</span> plays' +
        '<span class="sep">·</span><span class="v">' + commas(o.artists) + '</span> artists' +
        '<span class="sep">·</span><span class="v">' + commas(o.tracks)  + '</span> unique tracks';
}

// ── Overview ─────────────────────────────────────────────────────────────────
function initOverview() {
    const yrs    = D.yrList;
    const maxHrs = Math.max(...yrs.map(y => D.yrs[y].hrs));

    document.getElementById('hr-chart').innerHTML = yrs.map(y => {
        const d = D.yrs[y];
        const w = (d.hrs / maxHrs * 100).toFixed(1);
        return '<div class="brow"><div class="blbl">' + y + '</div>' +
               '<div class="btrack"><div class="bfill" style="width:' + w + '%;background:#7a8c9e"></div></div>' +
               '<div class="bval">' + commas(d.hrs) + 'h</div></div>';
    }).join('');
}

// ── All-time ─────────────────────────────────────────────────────────────────
function initAllTime() {
    document.getElementById('tbl-ata').innerHTML =
        '<thead><tr><th style="width:24px">#</th><th>artist</th><th class="r">plays</th><th class="r">hours</th></tr></thead>' +
        '<tbody>' + D.atA.map(function(a, i) {
            return '<tr><td style="color:#2e2e2a">' + (i+1) + '</td>' +
                   '<td>' + esc(a.name) + '</td>' +
                   '<td class="r" style="color:#808078">' + commas(a.plays) + '</td>' +
                   '<td class="r" style="color:#484840">' + a.hrs + 'h</td></tr>';
        }).join('') + '</tbody>';

    document.getElementById('tbl-att').innerHTML =
        '<thead><tr><th style="width:24px">#</th><th>track</th><th class="r">plays</th><th class="r">hours</th></tr></thead>' +
        '<tbody>' + D.atT.map(function(t, i) {
            return '<tr><td style="color:#2e2e2a">' + (i+1) + '</td>' +
                   '<td>' + esc(t.name) + '<span class="sp-sub">' + esc(t.artist) + '</span></td>' +
                   '<td class="r" style="color:#808078">' + commas(t.plays) + '</td>' +
                   '<td class="r" style="color:#484840">' + t.hrs + 'h</td></tr>';
        }).join('') + '</tbody>';
}

// ── By year ──────────────────────────────────────────────────────────────────
var _yr = D.yrList[D.yrList.length - 1];

function initYearly() {
    document.getElementById('yr-pills').innerHTML = D.yrList.map(function(y) {
        return `<button class="sp-nb${y === _yr ? ' on' : ''}" onclick="showYr('${y}',this)">${y}</button>`;
    }).join('');
    renderYr(_yr);
}

function showYr(y, btn) {
    _yr = y;
    document.querySelectorAll('#yr-pills .sp-nb').forEach(function(b) { b.classList.remove('on'); });
    btn.classList.add('on');
    renderYr(y);
}

function renderYr(y) {
    var d = D.yrs[y];
    document.getElementById('yr-stats').innerHTML =
        '<span class="v">' + commas(d.plays) + '</span> plays' +
        '<span class="sep">·</span><span class="v">' + commas(d.hrs) + 'h</span>' +
        '<span class="sep">·</span><span class="v">' + commas(d.uartists) + '</span> artists';

    document.getElementById('yr-content').innerHTML =
        '<div>' +
            '<div class="sp-subh">top artists</div>' +
            '<table class="st-tbl sp-tbl"><thead><tr>' +
                '<th style="width:24px">#</th><th>artist</th><th class="r">plays</th><th class="r">hrs</th>' +
            '</tr></thead><tbody>' +
            d.topArtists.map(function(a, i) {
                return '<tr><td style="color:#2e2e2a">' + (i+1) + '</td>' +
                       '<td>' + esc(a.name) + '</td>' +
                       '<td class="r" style="color:#808078">' + commas(a.plays) + '</td>' +
                       '<td class="r" style="color:#484840">' + a.hrs + 'h</td></tr>';
            }).join('') +
            '</tbody></table>' +
        '</div>' +
        '<div>' +
            '<div class="sp-subh">top tracks</div>' +
            '<table class="st-tbl sp-tbl"><thead><tr>' +
                '<th style="width:24px">#</th><th>track</th><th class="r">plays</th>' +
            '</tr></thead><tbody>' +
            d.topTracks.map(function(t, i) {
                return '<tr><td style="color:#2e2e2a">' + (i+1) + '</td>' +
                       '<td>' + esc(t.name) + '<span class="sp-sub">' + esc(t.artist) + '</span></td>' +
                       '<td class="r" style="color:#808078">' + commas(t.plays) + '</td></tr>';
            }).join('') +
            '</tbody></table>' +
        '</div>';
}

// ── Quarterly ────────────────────────────────────────────────────────────────
function initQtr() {
    var years = Array.from(new Set(D.qtr.map(function(r) { return r.year; }))).sort();
    var ySel  = document.getElementById('qy');
    var gSel  = document.getElementById('qg');
    years.forEach(function(y) { ySel.add(new Option(y, y)); });
    D.genres.forEach(function(g) { gSel.add(new Option(g, g)); });
    ySel.value = years[years.length - 1];
    rqtr();
}

function rqtr() {
    var s = document.getElementById('qs').value.toLowerCase();
    var y = document.getElementById('qy').value;
    var q = document.getElementById('qq').value;
    var g = document.getElementById('qg').value;

    var rows = D.qtr.filter(function(r) {
        return (!s || r.track.toLowerCase().indexOf(s) >= 0 || r.artist.toLowerCase().indexOf(s) >= 0) &&
               (!y || r.year === y) &&
               (!q || r.q === q) &&
               (!g || r.genre === g);
    });

    document.getElementById('qrc').textContent =
        commas(rows.length) + ' result' + (rows.length !== 1 ? 's' : '') +
        (rows.length > 500 ? ' (showing first 500)' : '');

    document.getElementById('q-body').innerHTML = rows.slice(0, 500).map(function(r) {
        return '<tr>' +
            '<td style="color:#2e2e2a">' + r.rank + '</td>' +
            '<td>' + esc(r.track) + '</td>' +
            '<td>' + esc(r.artist) + (r.note ? '<span class="sp-sub sp-note">' + esc(r.note) + '</span>' : '') + '</td>' +
            '<td class="r" style="color:#808078">' + r.plays + '</td>' +
            '<td class="sp-genre">' + esc(r.genre) + '</td>' +
            '<td style="color:#484840">' + r.period + '</td>' +
            '</tr>';
    }).join('');
}

// ── Devices ──────────────────────────────────────────────────────────────────
var DEV_COL = {
    'OnePlus One': '#9a6a4a',
    'OnePlus 5T':  '#8a7a5a',
    'iPhone 11':   '#5a7a8a',
    'iOS':         '#5a7a8a',
    'Windows':     '#7a8c9e',
    'Web Player':  '#6a8a8a',
    'Chromecast':  '#8a8a5a',
    'Amazon Echo': '#5a8a6a',
    'Samsung TV':  '#8a6a8a',
    'Other':       '#484840'
};

var _dyr = D.yrList[D.yrList.length - 1];

function initDevices() {
    document.getElementById('dev-pills').innerHTML = D.yrList.map(function(y) {
        return `<button class="sp-nb${y === _dyr ? ' on' : ''}" onclick="showDev('${y}',this)">${y}</button>`;
    }).join('');
    renderDev(_dyr);
}

function showDev(y, btn) {
    _dyr = y;
    document.querySelectorAll('#dev-pills .sp-nb').forEach(function(b) { b.classList.remove('on'); });
    btn.classList.add('on');
    renderDev(y);
}

function renderDev(y) {
    var devs   = D.dev[y] || [];
    var maxPct = devs.length ? devs[0].pct : 1;
    document.getElementById('dev-content').innerHTML =
        '<div class="devbars">' + devs.map(function(d) {
            var col = DEV_COL[d.device] || '#484840';
            var w   = (d.pct / maxPct * 100).toFixed(1);
            return '<div class="drow">' +
                '<div class="dn">' + esc(d.device) + '</div>' +
                '<div class="btrack"><div class="bfill" style="width:' + w + '%;background:' + col + '"></div></div>' +
                '<div class="dp dplays">' + commas(d.plays) + '</div>' +
                '<div class="dp">' + d.pct + '%</div>' +
                '</div>';
        }).join('') + '</div>';
}

// ── Init ─────────────────────────────────────────────────────────────────────
initHeader();
initOverview();
initAllTime();
initYearly();
initQtr();
initDevices();
</script>
